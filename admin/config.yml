backend:
  name: git-gateway
  branch: master
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-login}}
    update: Update {{collection}} “{{slug}}” - {{author-login}}
    delete: Delete {{collection}} “{{slug}}” - {{author-login}}
    uploadMedia: Upload “{{path}}” - {{author-login}}
    deleteMedia: Delete “{{path}}” - {{author-login}}

publish_mode: simple
media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "_"

collections:
  - name: "shows"
    label: "Shows"
    folder: "_posts"
    editor:
      preview: true
    filter: {field: "editable", value: "true"}
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    encoding: "ascii"
    clean_accents: true
    sanitize_replacement: "_"
    extension: "md"
    create: true
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - { label: "Editable", name: "editable", widget: "hidden", default: "true"}
      - { label: "Title", name: "title", widget: "string", hint: "Title of the show. Avoid quotes." }
      - { label: "Description", name: "description", widget: "string", hint: "Short 150 chars description for SEO"}
      - { label: "Feature Image", name: "feature-img", widget: "image", allow_multiple: false, hint: "Main image appears top of page as background. Recommend 1920x1005. Keep it under 300k for faster loading."}
      - { label: "SEO Image", name: "image", widget: "image", allow_multiple: false, required: false, hint: "Used by Google for Event/Article rich results. Usually mirror Feature Image. 1200x630 minimum."}
      - { label: "Thumbnail", name: "thumbnail", widget: "image", allow_multiple: false, hint: "Square image e.g. 1080x1080. Keep it under 300k for faster loading. This is shown when sharing the link on e.g. WhatsApp"}
      - { label: "Excerpt Separator", name: "excerpt_separator", widget: "hidden", default: "<!--more-->"}
      - { label: "Permalink", name: "permalink", widget: "string", hint: "Should begin and end in forward slack e.g. /comedybrew/", required: true}
      - { label: "Ticket URL", name: "ticket_url", widget: "string", hint: "Link to the ticket page for a nice red button. Use bit.ly to track!!!", required: false }
      - { label: "Event type", name: "event_type", widget: "select", required: false, options: ["series", "monthly", "one-off", "variable-venue"], hint: "How does this show recur? Mostly informational — script's behavior depends on venue_slug + ticket_url, not this field."}
      - { label: "Venue (slug)", name: "venue_slug", widget: "string", required: false, hint: "Foreign key into _data/venues.yml. Examples: robins, otro, monroe. Determines location info in Event schema. Empty = script skips this post (variable-venue shows)."}
      # ----- Hidden fields — populated by script/refresh-next-event-dates.rb from Eventfrog. -----
      # Editing here would just be overwritten on the next cron run.
      - { label: "Recurrence day", name: "recurrence_day", widget: "hidden"}
      - { label: "Recurrence time (HH:MM)", name: "recurrence_time", widget: "hidden"}
      - { label: "Default duration (minutes)", name: "default_duration_minutes", widget: "hidden"}
      - { label: "Next event date", name: "next_event_date", widget: "hidden"}
      - { label: "Next event end date", name: "next_event_end_date", widget: "hidden"}
      - { label: "Price (CHF)", name: "price_chf", widget: "hidden"}
      - { label: "Price max (CHF)", name: "price_chf_max", widget: "hidden"}
      - { label: "Performers", name: "performers", widget: "hidden"}
      - { label: "Last modified at", name: "last_modified_at", widget: "hidden"}
      - { label: 'Body', name: 'body', widget: 'markdown', mode: 'rich_text', buttons: ['bold', 'italic', 'link', 'heading-one', 'heading-two', 'heading-three', 'bulleted-list', 'numbered-list'], 'editor_components': ['image'] }
# Venues editor deferred — _data/venues.yml is hash-keyed (slug → venue) which doesn't
# map cleanly to Decap CMS file collections. Manual edits to _data/venues.yml for now.
# Sprint 2 task: introduce a list-of-objects venues file and a Decap venues collection.
