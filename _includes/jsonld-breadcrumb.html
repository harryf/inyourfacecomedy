{%- comment -%}
  BreadcrumbList JSON-LD partial.
  Flat two-level hierarchy: Home → current page. Emitted on every non-home page
  (the conditional lives in _includes/default/head.liquid).
{%- endcomment -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.url }}/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ page.title | default: site.title | jsonify }},
      "item": "{{ page.url | absolute_url }}"
    }
  ]
}
</script>
