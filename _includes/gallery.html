<div class="iyf-gallery">
{% assign n = site.static_files | size %}
{% assign images = site.static_files | sample: n %}
{% for image in images %}
  {% if image.path contains include.gallery_path %}
    {% unless image.path contains '.md' %}
      <figure>
        <img src="{{ image.path | relative_url }}" alt="" loading="lazy">
      </figure>
    {% endunless %}
  {% endif %}
{% endfor %}
</div>
