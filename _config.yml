# SITE CONFIGURATION
baseurl: ""
url: "https://inyourfacecomedy.ch"

# THEME-SPECIFIC CONFIGURATION
title: IN YOUR FACE Comedy                                    # site's title
description: "English Stand-Up Comedy in Zürich, Switzerland"      # used by search engines

# Default image for og:image / twitter:image — jekyll-seo-tag 2.9.0 only reads page.image
# (not site.image), so we inject `image:` as a front-matter default via Jekyll defaults below.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/thumbs/inyourface_thumb.png

# Default author for all pages (consumed by jekyll-seo-tag → BlogPosting JSON-LD).
# Per-post `author:` front-matter overrides this when present.
# The `type: Organization` field requires jekyll-seo-tag >= 2.8.0 (see type-on-strap.gemspec).
author:
  type: Organization
  name: "IN YOUR FACE Comedy"
  url: "https://inyourfacecomedy.ch"
avatar: assets/img/inyourface.png                         # Empty for no avatar in navbar
favicon: assets/favicon.ico                             # Icon displayed in the tab

# Header and footer text
header_text: English Stand-Up Comedy in Zürich  # Change Blog header text
header_feature_image: assets/img/header/inyourface.jpeg
header_feature_image_responsive: true
footer_text: >
  Get early updates on shows on the <a href="https://t.me/inyourfacecomedy">IN YOUR FACE Telegram Channel</a>

# Blog
excerpt: false                                           # Or "truncate" (first 250 characters), "false" to disable
post_navigation: false
color_image: /assets/img/lineart.png                    # A bit transparent for color posts.
future: true

# Features
# More in the _data folder for share buttons, author and language
# For layout customization, go to the "_sass > base" folder, and check "_variables.scss"
katex: false                                             # Enable if using math markup
mermaid: false                                          # Disabled — no page uses mermaid diagrams. Re-enable per-theme: base, forest, dark, default, neutral
google_tagmanager: GTM-M7Z9D4Z
google_analytics: G-JZBDD4CQWV                          # Tracking ID, e.g. "UA-000000-01"
meta_pixel: 5349931195130820                            # Tracking ID for Facebook Meta Pixel
cookie_consent: false                                   # To respect the usage of cookies
ms_clarify: qbtk7v2ls4                                  # Tracking ID for Microsoft Clarity

color_theme: dark                                       # auto, dark or light

facebook:
  publisher: https://www.facebook.com/inyourfacecomedy.ch/

social:
  instagram: https://instagram.com/inyourfacecomedy
  tiktok: https://tiktok.com/@inyourfacecomedy
  facebook: https://www.facebook.com/inyourfacecomedy.ch/
  telegram: https://t.me/inyourfacecomedy
  meetup: https://www.meetup.com/in-your-face-english_stand-up-comedy-in-zurich/
  youtube: https://www.youtube.com/@inyourfacecomedystudios

include:
  - 4428d17dabee4ceb92c215e99a3dec6e.txt

# Comments
comments:
  disqus_shortname:                                     # Your discus shortname for comments
  cusdis_app_id:                                        # Your cusdis data-app-id
  utterances:                                           # Enable by filling below information. For more info, go to https://utteranc.es
    repo:                                               # your public comments repository (e.g. owner/repo)
    issue-term:                                         # Issue term (e.g. "comment" consider issues with this word in the title as comments)

# PAGINATION
paginate: 100
paginate_path: "/blog/page:num"

permalink: /:title/

# COLLECTIONS
# Comedians directory: sourced from Grist via `script/sync-comedians.rb`.
# Each `_comedians/<slug>.md` becomes a page at /comedians/<slug>/.
collections:
  comedians:
    output: true
    permalink: /comedians/:name/

# BUILD SETTINGS
sass:
  style: compressed
exclude: [".jekyll-cache", ".jekyll-metadata", ".idea", "vendor/*", "assets/node_modules/*", "script/*", "node_modules", "package.json", "bunfig.toml", "bun.lock", "bun.lockb", "assets/js/__tests__",
  # Internal dev docs — keep them out of the published site (CNAME stays; it sets the domain).
  "README.md", "CLAUDE.md", "COMEDIAN_SEO.md", "SHOW_PROMO_LINKS.md", "CALENDAR_STRUCTURE.md", "WRITING_GUIDE.md", "FLYER_DESIGN.md",
  # Google Business Profile poster: descriptions, state, setup doc — used by script/post-events-to-google.rb, never published.
  "gbp"]

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jemoji
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

# Google Business Profile review URL — single source of truth for /follow/ + footer.
gbp_review_url: https://g.page/r/CeQdoyHYfl-8EBM/review
# Tripadvisor "write a review" URL — footer review block (second button).
tripadvisor_review_url: https://www.tripadvisor.com/UserReviewEdit-g188113-d24051458-IN_YOUR_FACE_Comedy-Zurich.html
